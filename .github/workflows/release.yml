name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        default: false

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v3

      - run: chmod +x gradlew

      - name: Get version
        id: version
        run: |
          TAG=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          IS_PRE=$([[ "$TAG" == *"-rc"* || "$TAG" == *"-beta"* || "$TAG" == *"-alpha"* || "${{ github.event.inputs.prerelease }}" == "true" ]] && echo true || echo false)
          echo "is_prerelease=$IS_PRE" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Build Release APK & AAB
        run: |
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Stage Artifacts
        run: |
          V=${{ steps.version.outputs.version }}
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk dist/StreamTV-$V.apk
          cp app/build/outputs/bundle/release/app-release.aab dist/StreamTV-$V.aab

      - name: Cleanup Keystore
        if: always()
        run: rm -f release.keystore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "StreamTV ${{ steps.version.outputs.version }}"
          prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/StreamTV-${{ steps.version.outputs.version }}.apk
            dist/StreamTV-${{ steps.version.outputs.version }}.aab
          token: ${{ secrets.GITHUB_TOKEN }}
